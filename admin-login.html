<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - GameZone</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        .admin-login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px;
        }

        .admin-login-card {
            background: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .admin-login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .admin-login-header h1 {
            font-size: 2rem;
            color: #212529;
            margin-bottom: 8px;
        }

        .admin-login-header p {
            color: #6c757d;
        }

        .admin-badge {
            background: #dc3545;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #212529;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            background: #ffffff;
            color: #212529;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .form-group input::placeholder {
            color: #6c757d;
        }

        .admin-login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #dc3545, #c82333);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .admin-login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(220, 53, 69, 0.3);
        }

        .admin-login-footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
        }

        .admin-login-footer a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
        }

        .admin-login-footer a:hover {
            text-decoration: underline;
        }

        .security-notice {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #495057;
        }

        .security-notice strong {
            color: #dc3545;
        }

        .brand {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            display: inline-block;
            margin-bottom: 10px;
        }

        .error-message {
            background: #dc3545;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #28a745;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .admin-login-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="admin-login-container">
        <div class="admin-login-card">
            <div class="brand">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
                        <circle class="orbit" cx="25" cy="25" r="15" fill="none" stroke="#071024" stroke-width="2" />
                        <circle class="planet" cx="40" cy="25" r="3" fill="#071024" />
                        <text x="25" y="32" font-size="20" font-weight="bold" text-anchor="middle" fill="#071024">GZ</text>
                    </svg>
                </div>
                <div>
                    <h1 style="font-family: 'Pacifico', cursive; margin: 10px 0 0 0;">GameZone</h1>
                    <p style="color: black;">Admin Portal</p>
                </div>
            </div>

            <div class="admin-login-header">
                <span class="admin-badge">Administrator Access</span>
                <h1>Admin Login</h1>
                <p>Enter your admin credentials</p>
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage">Login successful! Redirecting...</div>

            <div class="security-notice">
                <strong>🔒 Secure Access:</strong> This portal is for authorized administrators only. All access attempts are logged.
            </div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminUsername">Username</label>
                    <input type="text" id="adminUsername" name="adminUsername" required placeholder="Enter admin username">
                </div>

                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" name="adminPassword" required placeholder="Enter admin password">
                </div>

                <button type="submit" class="admin-login-btn">Login to Admin Panel</button>
            </form>

            <div class="admin-login-footer">
                <p>👤 Regular user? <a href="login.html">User Login</a></p>
                <p style="margin-top: 10px; font-size: 14px; color: #6c757d;">
                    <a href="index.html">← Back to Store</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Admin login functionality
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Hide previous messages
            errorMessage.classList.remove('show');
            successMessage.classList.remove('show');
            
            // Simple admin authentication (in production, use proper authentication)
            if (username === 'vishal' && password === 'vishal1427') {
                // Set admin session
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('adminUser', username);
                
                // Show success message
                successMessage.classList.add('show');
                
                // Disable form
                const formElements = document.querySelectorAll('#adminLoginForm input, #adminLoginForm button');
                formElements.forEach(element => element.disabled = true);
                
                // Redirect to admin panel
                setTimeout(() => {
                    window.location.href = 'admin-dashboard-design.html';
                }, 1500);
            } else {
                // Show error message
                errorMessage.textContent = '❌ Invalid credentials. Please try again.';
                errorMessage.classList.add('show');
                
                // Shake animation
                const card = document.querySelector('.admin-login-card');
                card.style.animation = 'shake 0.5s';
                setTimeout(() => {
                    card.style.animation = '';
                }, 500);
            }
        });

        // Add shake animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(style);

        // Check if already logged in as admin
        document.addEventListener('DOMContentLoaded', function() {
            if (localStorage.getItem('isAdmin') === 'true') {
                window.location.href = 'admin-dashboard-design.html';
            }
        });
    </script>
</body>
</html>
