<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Now - GameZone</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .buy-container {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .buy-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .buy-header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #00ff88, #00d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .buy-header p {
            color: #888;
            font-size: 14px;
        }

        .product-display {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .product-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }

        .product-info h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: #00ff88;
            margin-bottom: 5px;
        }

        .original-price {
            text-decoration: line-through;
            color: #666;
            font-size: 1rem;
            margin-left: 10px;
        }

        .discount-badge {
            background: #ff4757;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 10px;
        }

        .stock-status {
            color: #00ff88;
            font-size: 14px;
            margin-top: 8px;
        }

        .quantity-section {
            margin-bottom: 25px;
        }

        .quantity-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 0;
            width: fit-content;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .quantity-controls button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .quantity-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .quantity-controls input {
            width: 70px;
            height: 45px;
            text-align: center;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
        }

        .price-summary {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            color: #888;
            font-size: 14px;
        }

        .summary-row.total {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
        }

        .buy-button {
            width: 100%;
            background: linear-gradient(135deg, #00ff88 0%, #00d9ff 100%);
            color: #071024;
            padding: 18px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .buy-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        .back-button {
            width: 100%;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 14px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-button:hover {
            border-color: #00d9ff;
            background: rgba(0, 212, 255, 0.1);
        }

        .no-product {
            text-align: center;
            padding: 40px;
        }

        .no-product h2 {
            color: #ff4757;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="buy-container">
        <div class="buy-header">
            <h1>Complete Your Purchase</h1>
            <p>Review and buy your gaming gear</p>
        </div>

        <div id="productDisplay" class="product-display" style="display: none;">
            <img id="productImage" class="product-image" src="" alt="Product">
            <div class="product-info">
                <h2 id="productName">Product Name</h2>
                <div class="product-price">
                    ₹<span id="finalPrice">0</span>
                    <span id="originalPriceDisplay" class="original-price" style="display: none;"></span>
                    <span id="discountBadge" class="discount-badge" style="display: none;"></span>
                </div>
                <p id="stockStatus" class="stock-status">In Stock</p>
            </div>
        </div>

        <div id="noProductMessage" class="no-product" style="display: none;">
            <h2>⚠️ No Product Selected</h2>
            <p>Please go back and select a product to buy.</p>
        </div>

        <div id="buyControls" style="display: none;">
            <div class="quantity-section">
                <label>Quantity:</label>
                <div class="quantity-controls">
                    <button onclick="changeQuantity(-1)">-</button>
                    <input type="number" id="quantity" value="1" min="1" max="10" readonly>
                    <button onclick="changeQuantity(1)">+</button>
                </div>
            </div>

            <div class="price-summary">
                <div class="summary-row">
                    <span>Price:</span>
                    <span id="itemPrice">₹0</span>
                </div>
                <div class="summary-row">
                    <span>Quantity:</span>
                    <span id="qtyDisplay">1</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="totalPrice">₹0</span>
                </div>
            </div>

            <button class="buy-button" onclick="completePurchase()">
                Buy Now
            </button>
            <button class="back-button" onclick="goBack()">
                ← Continue Shopping
            </button>
        </div>
    </div>

    <script>
        let currentProduct = null;
        let quantity = 1;

        // Load product from URL parameters or localStorage
        function loadProduct() {
            // Check URL parameters first
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            
            if (productId && window.gameZoneData) {
                currentProduct = window.gameZoneData.getProduct(parseInt(productId));
            }
            
            // Fallback to localStorage
            if (!currentProduct) {
                const storedProduct = localStorage.getItem('buyNowProduct');
                if (storedProduct) {
                    currentProduct = JSON.parse(storedProduct);
                }
            }

            if (currentProduct) {
                displayProduct();
            } else {
                showNoProduct();
            }
        }

        function displayProduct() {
            document.getElementById('productDisplay').style.display = 'flex';
            document.getElementById('buyControls').style.display = 'block';
            document.getElementById('noProductMessage').style.display = 'none';

            document.getElementById('productName').textContent = currentProduct.name;
            document.getElementById('productImage').src = currentProduct.image || 'images/product-placeholder.jpg';
            
            // Calculate price
            let finalPrice = currentProduct.price;
            let originalPrice = currentProduct.originalPrice || currentProduct.price;
            let discount = 0;

            if (currentProduct.hasOffer && currentProduct.discount) {
                discount = currentProduct.discount;
                finalPrice = currentProduct.price * (1 - discount / 100);
            }

            document.getElementById('finalPrice').textContent = Math.round(finalPrice).toLocaleString('en-IN');
            
            if (discount > 0) {
                document.getElementById('originalPriceDisplay').textContent = '₹' + originalPrice.toLocaleString('en-IN');
                document.getElementById('originalPriceDisplay').style.display = 'inline';
                document.getElementById('discountBadge').textContent = '-' + discount + '%';
                document.getElementById('discountBadge').style.display = 'inline';
            }

            // Stock status
            const stockStatus = document.getElementById('stockStatus');
            if (currentProduct.stock <= 0) {
                stockStatus.textContent = 'Out of Stock';
                stockStatus.style.color = '#ff4757';
                document.querySelector('.buy-button').disabled = true;
                document.querySelector('.buy-button').textContent = 'Out of Stock';
                document.querySelector('.buy-button').style.background = '#374151';
            } else if (currentProduct.stock < 5) {
                stockStatus.textContent = 'Only ' + currentProduct.stock + ' left!';
                stockStatus.style.color = '#ffa502';
            }

            updatePriceSummary();
        }

        function showNoProduct() {
            document.getElementById('productDisplay').style.display = 'none';
            document.getElementById('buyControls').style.display = 'none';
            document.getElementById('noProductMessage').style.display = 'block';
        }

        function changeQuantity(delta) {
            const newQty = quantity + delta;
            if (newQty >= 1 && newQty <= 10 && newQty <= (currentProduct?.stock || 10)) {
                quantity = newQty;
                document.getElementById('quantity').value = quantity;
                document.getElementById('qtyDisplay').textContent = quantity;
                updatePriceSummary();
            }
        }

        function updatePriceSummary() {
            if (!currentProduct) return;

            let price = currentProduct.price;
            if (currentProduct.hasOffer && currentProduct.discount) {
                price = price * (1 - currentProduct.discount / 100);
            }

            const total = Math.round(price * quantity);
            
            document.getElementById('itemPrice').textContent = '₹' + Math.round(price).toLocaleString('en-IN');
            document.getElementById('totalPrice').textContent = '₹' + total.toLocaleString('en-IN');
        }

        function completePurchase() {
            if (!currentProduct || currentProduct.stock <= 0) {
                alert('Product is out of stock!');
                return;
            }

            // Add to cart
            const cart = JSON.parse(localStorage.getItem('gamezone_cart') || '[]');
            
            for (let i = 0; i < quantity; i++) {
                cart.push({
                    id: Date.now() + i,
                    name: currentProduct.name,
                    price: parseFloat(document.getElementById('finalPrice').textContent.replace(/,/g, '')),
                    image: currentProduct.image,
                    quantity: 1
                });
            }
            
            localStorage.setItem('gamezone_cart', JSON.stringify(cart));
            
            // Clear buy now product
            localStorage.removeItem('buyNowProduct');
            
            // Show success and redirect
            alert(`Successfully added ${quantity} x ${currentProduct.name} to cart!`);
            window.location.href = 'cart.html';
        }

        function goBack() {
            window.history.back();
        }

        // Load product when page loads
        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
    <script src="data-manager.js"></script>
</body>
</html>
