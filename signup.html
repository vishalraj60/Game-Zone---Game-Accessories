<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - GameZone</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Pacifico&display=swap"
    rel="stylesheet">
  <script src="script.js" defer></script>
  <style>
    body {
      background: radial-gradient(circle at 80% 20%, #1e2129 0%, #0c0d0e 100%) !important;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow-x: hidden;
    }

    .ambient-glow {
      position: fixed;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 212, 255, 0.08) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
      filter: blur(50px);
    }

    .glow-1 {
      top: -10%;
      left: -10%;
      animation: ambientMove1 20s ease-in-out infinite alternate;
    }

    .glow-2 {
      bottom: -10%;
      right: -10%;
      background: radial-gradient(circle, rgba(0, 85, 255, 0.05) 0%, transparent 70%);
      animation: ambientMove2 20s ease-in-out infinite alternate;
    }

    @keyframes ambientMove1 {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(80px, 40px) scale(1.1);
      }
    }

    @keyframes ambientMove2 {
      0% {
        transform: translate(0, 0) scale(1.1);
      }

      100% {
        transform: translate(-80px, -40px) scale(1);
      }
    }

    .login-card {
      background: rgba(12, 13, 14, 0.6) !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-radius: 20px !important;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 25px rgba(0, 212, 255, 0.02) !important;
      backdrop-filter: blur(16px) !important;
      -webkit-backdrop-filter: blur(16px) !important;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
      max-width: 450px !important;
    }

    .login-card:hover {
      border-color: rgba(0, 212, 255, 0.2) !important;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 35px rgba(0, 212, 255, 0.04) !important;
    }

    .auth-toggle {
      display: flex;
      background: rgba(255, 255, 255, 0.02) !important;
      border: 1px solid rgba(255, 255, 255, 0.05) !important;
      border-radius: 30px !important;
      padding: 4px !important;
      margin-bottom: 30px !important;
      width: 100%;
    }

    .toggle-tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      color: rgba(255, 255, 255, 0.6) !important;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      border-radius: 26px;
      transition: all 0.3s ease;
    }

    .toggle-tab:hover {
      color: #ffffff !important;
    }

    .toggle-tab.active {
      background: rgba(255, 255, 255, 0.05) !important;
      color: var(--accent) !important;
      border: 1px solid rgba(0, 212, 255, 0.2) !important;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.1) !important;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.02) !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      border-radius: 10px !important;
      color: #ffffff !important;
      font-size: 14px !important;
      transition: all 0.3s ease !important;
    }

    .form-group input:focus {
      outline: none !important;
      border-color: var(--accent) !important;
      background: rgba(255, 255, 255, 0.04) !important;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.15) !important;
    }

    .form-group label {
      color: rgba(255, 255, 255, 0.7) !important;
      font-size: 13px !important;
      font-weight: 500 !important;
      letter-spacing: 0.5px !important;
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #ffffff !important;
      background: rgba(0, 0, 0, 0.3) !important;
      border: 1.5px solid var(--accent) !important;
      border-radius: 25px !important;
      cursor: pointer;
      transition: all 0.3s ease !important;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.1) !important;
      margin-top: 10px;
    }

    .login-btn:hover {
      background: var(--accent) !important;
      color: #0c0d0e !important;
      box-shadow: 0 0 25px rgba(0, 212, 255, 0.4) !important;
      transform: translateY(-2px) !important;
    }

    .login-btn:active {
      transform: translateY(0) !important;
    }

    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s ease;
      z-index: 10;
    }

    .toggle-password:hover {
      color: var(--accent);
    }

    .toggle-password svg {
      width: 18px;
      height: 18px;
    }

    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
      text-align: center;
      position: relative;
      z-index: 5;
    }

    .success-message {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid #10b981;
      color: #10b981;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
      text-align: center;
      position: relative;
      z-index: 5;
    }

    .login-main {
      padding-top: 120px !important;
    }
  </style>
</head>

<body>
  <!-- Ambient lighting glows -->
  <div class="ambient-glow glow-1"></div>
  <div class="ambient-glow glow-2"></div>

  <div class="wrap" style="position: relative; z-index: 1;">
    <!-- Header -->
    <header>
      <div class="header-content">
        <div class="logo-section">
          <div class="logo">
            <svg class="logo-icon" viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
              <circle class="orbit" cx="25" cy="25" r="15" fill="none" stroke="var(--accent)" stroke-width="2" />
              <circle class="planet" cx="40" cy="25" r="3" fill="var(--accent)" />
              <text x="25" y="32" font-size="20" font-weight="bold" text-anchor="middle" fill="#ffffff">GZ</text>
            </svg>
          </div>
          <div class="brand-text">
            <h1>GameZone</h1>
            <p>Gaming Accessories</p>
          </div>
        </div>

        <ul class="nav-menu">
          <li><a href="landingpage.html" class="nav-link">Home</a></li>
          <li><a href="landingpage.html#features" class="nav-link">About</a></li>
          <li><a href="index.html" class="nav-link">Product</a></li>
          <li><a href="#footer" class="nav-link">Contact</a></li>
        </ul>

        <div class="nav-ticker">
          <div class="ticker-track">
            <img src="images/ps5-controller.png" alt="Controller">
            <img src="images/gaming-monitor.png" alt="Monitor">
            <img src="images/gaming-speakers.png" alt="Speakers">
            <img src="images/gaming-webcam.png" alt="Webcam">
            <img src="images/hero_mouse_main.png" alt="Mouse">
            <!-- Duplicate for seamless looping -->
            <img src="images/ps5-controller.png" alt="Controller">
            <img src="images/gaming-monitor.png" alt="Monitor">
            <img src="images/gaming-speakers.png" alt="Speakers">
            <img src="images/gaming-webcam.png" alt="Webcam">
            <img src="images/hero_mouse_main.png" alt="Mouse">
          </div>
        </div>

        <div class="auth-buttons">
          <!-- Profile Button -->
          <button class="profile-btn" id="profileBtn" aria-label="Profile" onclick="window.location.href='#'"
            style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span class="profile-name" id="profileName">Profile</span>
          </button>

          <!-- Cart Button -->
          <button class="cart-btn" aria-label="Cart" onclick="window.location.href='cart.html'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            <span class="cart-badge">0</span>
          </button>

          <a href="login.html" class="btn-login" id="headerLoginBtn">Login</a>
          <a href="signup.html" class="btn-signup" id="headerSignupBtn">Sign Up</a>
        </div>
      </div>
    </header>

    <main class="login-main">
      <div class="login-container">
        <div class="login-card">
          <!-- Split Sign In / Sign Up Toggle -->
          <div class="auth-toggle">
            <a href="login.html" class="toggle-tab">Sign In</a>
            <a href="signup.html" class="toggle-tab active">Sign Up</a>
          </div>

          <div class="login-header">
            <h2>Create Account</h2>
            <p>Join GameZone and start your gaming journey</p>
          </div>

          <div class="error-message" id="errorMessage"></div>
          <div class="success-message" id="successMessage"></div>

          <form class="login-form" id="signupForm">
            <div class="form-group">
              <label for="name">Full Name</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
              </div>
            </div>

            <div class="form-group">
              <label for="email">Email Address</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
              </div>
            </div>

            <div class="form-group">
              <label for="phone">Phone Number</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                  </path>
                </svg>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
              </div>
            </div>

            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="password" name="password" placeholder="Create a password" required
                  style="padding-right: 44px !important;">
                <button type="button" class="toggle-password" id="togglePassword">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password"
                  required style="padding-right: 44px !important;">
                <button type="button" class="toggle-password" id="toggleConfirmPassword">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </button>
              </div>
            </div>

            <div class="form-options">
              <label class="checkbox-label">
                <input type="checkbox" id="terms" name="terms" required>
                <span class="checkmark"></span>
                <span>I agree to the Terms & Conditions</span>
              </label>
            </div>

            <button type="submit" class="login-btn">Create Account</button>
          </form>

          <div class="login-divider">
            <span>Or continue with</span>
          </div>

          <div class="social-login">
            <button class="social-btn" aria-label="Sign in with Google">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                <path
                  d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.51 0-6.357-2.827-6.357-6.327S10.481 5.86 13.99 5.86c1.558 0 2.979.56 4.093 1.482l3.074-3.047C19.23 2.502 16.785 1.5 13.99 1.5c-5.787 0-10.49 4.67-10.49 10.414 0 5.744 4.703 10.413 10.49 10.413 6.044 0 10.051-4.215 10.051-10.155 0-.68-.077-1.2-.206-1.887H12.24z" />
              </svg>
              <span>Google</span>
            </button>
            <button class="social-btn" aria-label="Sign in with Discord">
              <svg width="18" height="18" viewBox="0 0 127.14 96.36" fill="currentColor">
                <path
                  d="M107.7,8.07A105.15,105.15,0,0,0,77.26,0a77.19,77.19,0,0,0-3.3,6.83A96.67,96.67,0,0,0,53.22,6.83,77.19,77.19,0,0,0,49.88,0,105.15,105.15,0,0,0,19.44,8.07C3.66,31.58-1.86,54.65,1,77.53A105.73,105.73,0,0,0,32,96.36a77.7,77.7,0,0,0,6.63-10.85,68.43,68.43,0,0,1-10.45-5c.87-.64,1.72-1.32,2.53-2a75.7,75.7,0,0,0,72.77,0c.81.7,1.66,1.38,2.53,2a68.52,68.52,0,0,1-10.45,5,77.7,77.7,0,0,0,6.63,10.85,105.73,105.73,0,0,0,31-18.83C129.87,50.12,123.63,27.27,107.7,8.07ZM42.45,65.69C36.18,65.69,31,60,31,53S36.18,40.36,42.45,40.36,53.88,46,53.88,53,48.72,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.24,60,73.24,53S78.41,40.36,84.69,40.36,96.12,46,96.12,53,91,65.69,84.69,65.69Z" />
              </svg>
              <span>Discord</span>
            </button>
          </div>
        </div>
      </div>
    </main>



    <script>
      // Set current year in footer
      const footerYear = document.getElementById('footerYear');
      if (footerYear) {
        footerYear.textContent = String(new Date().getFullYear());
      }

      // Toggle password visibility
      document.getElementById('togglePassword').addEventListener('click', function () {
        const passwordInput = document.getElementById('password');
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
      });

      document.getElementById('toggleConfirmPassword').addEventListener('click', function () {
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        confirmPasswordInput.setAttribute('type', type);
      });

      // Form validation and submission
      document.getElementById('signupForm').addEventListener('submit', function (e) {
        e.preventDefault();

        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Hide previous messages
        errorMessage.style.display = 'none';
        successMessage.style.display = 'none';

        // Get form values
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const terms = document.getElementById('terms').checked;

        // Validation
        if (name.length < 2) {
          showError('Name must be at least 2 characters long');
          return;
        }

        if (!isValidEmail(email)) {
          showError('Please enter a valid email address');
          return;
        }

        if (!isValidPhone(phone)) {
          showError('Please enter a valid phone number');
          return;
        }

        if (password.length < 6) {
          showError('Password must be at least 6 characters long');
          return;
        }

        if (password !== confirmPassword) {
          showError('Passwords do not match');
          return;
        }

        if (!terms) {
          showError('You must agree to the Terms & Conditions');
          return;
        }

        // Store user data (in real app, this would be sent to server)
        const userData = {
          name,
          email,
          phone,
          password,
          createdAt: new Date().toISOString()
        };

        localStorage.setItem('gamezone_user', JSON.stringify(userData));

        // Show success message
        showSuccess('Account created successfully! Redirecting to store...');

        // Redirect to index page after 2 seconds
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 2000);
      });

      function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }

      function isValidPhone(phone) {
        const phoneRegex = /^[\d\s\-\+\(\)]+$/;
        return phoneRegex.test(phone) && phone.replace(/\D/g, '').length >= 10;
      }

      function showError(message) {
        const errorMessage = document.getElementById('errorMessage');
        errorMessage.textContent = message;
        errorMessage.style.display = 'block';
      }

      function showSuccess(message) {
        const successMessage = document.getElementById('successMessage');
        successMessage.textContent = message;
        successMessage.style.display = 'block';
      }
    </script>
</body>

</html>
